##############################################################################
# automations.yaml — Complete Home Assistant Automations
#
# Copy the entire contents of this file into your HA automations.yaml, then:
#   Developer Tools → YAML → Reload Automations
#
# Sections:
#   1.  Leak Detection          (automations 1–2)
#   2.  Garage Doors            (automations 3–8)
#   3.  Salt Lamp               (automations 9–10)
#   4.  Air Quality — Bedroom   (automations 11–14)
#   5.  Air Quality — Office    (automations 15–18)
#   6.  Battery Alerts          (automation 19)
#   7.  Thermostat Presence     (automations 20–22)
#   8.  Garage Open Too Long    (automations 23–24)
#   9.  TOU Peak Mode           (automations 25–26)
#  10.  String Lights           (automations 27–28)
#  11.  Upstairs Hallway        (automations 29–31)
#  12.  Mock Door Sensors       (automations 32–34) — placeholders for Konnected zones
#  13.  Ring Snapshot Refresh   (automation 35)
##############################################################################


##############################################################################
# 1. LEAK DETECTION
##############################################################################


# 1. Leak Detected — Critical Alert
- alias: "Leak Detected — Critical Alert"
  id: leak_detected_critical_alert  # ID kept for HA history continuity
  description: >
    Sends a push notification to Louis and
    Lindsay whenever any leak sensor reports water. Names the exact location.
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.kitchen_sink_leak_detector
        - binary_sensor.laundry_room_leak_sensor
        - binary_sensor.master_bathroom_left_sink_leak_detector
        - binary_sensor.master_bathroom_right_sink_leak_detector
        - binary_sensor.powder_room_leak_sensor
        - binary_sensor.office_sink_leak_detector
        - binary_sensor.bedroom_3_sink_leak_detector
        - binary_sensor.second_floor_hall_bathroom_left_sink
        - binary_sensor.second_floor_hall_bathroom_right_sink_leak_detector
        - binary_sensor.butlers_kitchen_sink
        - binary_sensor.3rd_floor_furnace_leak_detector
        - binary_sensor.attic_air_handler_leak_detector
      to: "on"
  conditions: []
  actions:
    - variables:
        room_name: >-
          {% set names = {
            'binary_sensor.kitchen_sink_leak_detector':                        'Kitchen Sink',
            'binary_sensor.laundry_room_leak_sensor':                          'Laundry Room',
            'binary_sensor.master_bathroom_left_sink_leak_detector':           'Master Bath — Left Sink',
            'binary_sensor.master_bathroom_right_sink_leak_detector':          'Master Bath — Right Sink',
            'binary_sensor.powder_room_leak_sensor':                           'Powder Room',
            'binary_sensor.office_sink_leak_detector':                         'Office Sink',
            'binary_sensor.bedroom_3_sink_leak_detector':                      'Bedroom 3 Sink',
            'binary_sensor.second_floor_hall_bathroom_left_sink':              '2nd Floor Hall Bath — Left Sink',
            'binary_sensor.second_floor_hall_bathroom_right_sink_leak_detector': '2nd Floor Hall Bath — Right Sink',
            'binary_sensor.butlers_kitchen_sink':                              "Butler's Kitchen Sink",
            'binary_sensor.3rd_floor_furnace_leak_detector':                   '3rd Floor Furnace',
            'binary_sensor.attic_air_handler_leak_detector':                    'Attic Air Handler'
          } %}
          {{ names[trigger.entity_id] | default(trigger.entity_id) }}

    - alias: "Notify Louis"
      action: notify.mobile_app_louis_iphone
      data:
        title: "💧 Leak Detected"
        message: "{{ room_name }} is reporting water. Check immediately."
        data:
          tag: "leak_{{ trigger.entity_id }}"
          url: "{{ states('sensor.nabu_casa_security_url') }}"

    - alias: "Notify Lindsay"
      action: notify.mobile_app_lindsays_iphone
      data:
        title: "💧 Leak Detected"
        message: "{{ room_name }} is reporting water. Check immediately."
        data:
          tag: "leak_{{ trigger.entity_id }}"
          url: "{{ states('sensor.nabu_casa_security_url') }}"

    - alias: "Persistent HA notification"
      action: persistent_notification.create
      data:
        title: "💧 Leak Detected"
        message: "{{ room_name }} reported water at {{ now().strftime('%I:%M %p') }}."
        notification_id: "leak_{{ trigger.entity_id }}"

  mode: parallel
  max: 12


# 2. Leak Cleared — All Clear Notification
- alias: "Leak Cleared — All Clear Notification"
  id: leak_cleared_all_clear
  description: >
    Sends a follow-up notification when a leak sensor returns to dry.
    Dismisses the persistent HA notification.
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.kitchen_sink_leak_detector
        - binary_sensor.laundry_room_leak_sensor
        - binary_sensor.master_bathroom_left_sink_leak_detector
        - binary_sensor.master_bathroom_right_sink_leak_detector
        - binary_sensor.powder_room_leak_sensor
        - binary_sensor.office_sink_leak_detector
        - binary_sensor.bedroom_3_sink_leak_detector
        - binary_sensor.second_floor_hall_bathroom_left_sink
        - binary_sensor.second_floor_hall_bathroom_right_sink_leak_detector
        - binary_sensor.butlers_kitchen_sink
        - binary_sensor.3rd_floor_furnace_leak_detector
        - binary_sensor.attic_air_handler_leak_detector
      to: "off"
      from: "on"
  conditions: []
  actions:
    - variables:
        room_name: >-
          {% set names = {
            'binary_sensor.kitchen_sink_leak_detector':                        'Kitchen Sink',
            'binary_sensor.laundry_room_leak_sensor':                          'Laundry Room',
            'binary_sensor.master_bathroom_left_sink_leak_detector':           'Master Bath — Left Sink',
            'binary_sensor.master_bathroom_right_sink_leak_detector':          'Master Bath — Right Sink',
            'binary_sensor.powder_room_leak_sensor':                           'Powder Room',
            'binary_sensor.office_sink_leak_detector':                         'Office Sink',
            'binary_sensor.bedroom_3_sink_leak_detector':                      'Bedroom 3 Sink',
            'binary_sensor.second_floor_hall_bathroom_left_sink':              '2nd Floor Hall Bath — Left Sink',
            'binary_sensor.second_floor_hall_bathroom_right_sink_leak_detector': '2nd Floor Hall Bath — Right Sink',
            'binary_sensor.butlers_kitchen_sink':                              "Butler's Kitchen Sink",
            'binary_sensor.3rd_floor_furnace_leak_detector':                   '3rd Floor Furnace',
            'binary_sensor.attic_air_handler_leak_detector':                    'Attic Air Handler'
          } %}
          {{ names[trigger.entity_id] | default(trigger.entity_id) }}

    - alias: "Notify Louis — cleared"
      action: notify.mobile_app_louis_iphone
      data:
        title: "✅ Leak Cleared"
        message: "{{ room_name }} is now dry."
        data:
          tag: "leak_{{ trigger.entity_id }}"

    - alias: "Notify Lindsay — cleared"
      action: notify.mobile_app_lindsays_iphone
      data:
        title: "✅ Leak Cleared"
        message: "{{ room_name }} is now dry."
        data:
          tag: "leak_{{ trigger.entity_id }}"

    - alias: "Dismiss HA notification"
      action: persistent_notification.dismiss
      data:
        notification_id: "leak_{{ trigger.entity_id }}"

  mode: parallel
  max: 12


##############################################################################
# 2. GARAGE DOORS
##############################################################################


# 3. Open left garage when Louis arrives home
- alias: "Left Garage — Open on Louis Arrival"
  id: left_garage_open_louis_arrival
  description: >
    Opens the left garage door when Louis arrives home.
    Only fires if the door is already closed, it's between 6am and 11pm, and
    Louis was genuinely away (not_home for 2+ min — prevents HA restart bounce).
  triggers:
    - trigger: state
      entity_id: person.louis
      from: "not_home"
      to: "home"
  conditions:
    - condition: state
      entity_id: cover.left_garage_door_opener_garage_door
      state: "closed"
    - condition: time
      after: "06:00:00"
      before: "23:00:00"
    - condition: template
      value_template: >
        {{ (as_timestamp(now()) - as_timestamp(trigger.from_state.last_changed)) > 120 }}
  actions:
    - action: cover.open_cover
      target:
        entity_id: cover.left_garage_door_opener_garage_door
  mode: single


# 4. Close all garage doors at sunset
- alias: "Garage Doors — Close at Sunset"
  id: garage_close_at_sunset
  description: >
    Closes both garage doors at sunset. Only acts if at least one is open.
  triggers:
    - trigger: sun
      event: sunset
  conditions:
    - condition: or
      conditions:
        - condition: state
          entity_id: cover.left_garage_door_opener_garage_door
          state: "open"
        - condition: state
          entity_id: cover.right_garage_door_opener_garage_door
          state: "open"
  actions:
    - action: cover.close_cover
      target:
        entity_id:
          - cover.left_garage_door_opener_garage_door
          - cover.right_garage_door_opener_garage_door
  mode: single


# 5. Close both garage doors when last person leaves
- alias: "Garage Doors — Close When House Empty"
  id: garage_close_on_louis_departure
  description: >
    Closes both garage doors when the last person leaves home (zone.home drops
    to 0). Waits 1 minute to avoid closing on GPS blips.
  triggers:
    - trigger: state
      entity_id: zone.home
      to: "0"
      for:
        minutes: 1
  conditions:
    - condition: or
      conditions:
        - condition: state
          entity_id: cover.left_garage_door_opener_garage_door
          state: "open"
        - condition: state
          entity_id: cover.right_garage_door_opener_garage_door
          state: "open"
  actions:
    - action: cover.close_cover
      target:
        entity_id:
          - cover.left_garage_door_opener_garage_door
          - cover.right_garage_door_opener_garage_door
  mode: single


# 6. Backup — close garage doors at 11pm if still open
- alias: "Garage Doors — Backup Close at 11pm"
  id: garage_close_11pm_backup
  description: >
    Failsafe that closes both garage doors at 11pm if either is still open.
  triggers:
    - trigger: time
      at: "23:00:00"
  conditions:
    - condition: or
      conditions:
        - condition: state
          entity_id: cover.left_garage_door_opener_garage_door
          state: "open"
        - condition: state
          entity_id: cover.right_garage_door_opener_garage_door
          state: "open"
  actions:
    - action: cover.close_cover
      target:
        entity_id:
          - cover.left_garage_door_opener_garage_door
          - cover.right_garage_door_opener_garage_door
  mode: single


# 7. Notify when a garage door opens while both away
- alias: "Garage — Opened While Nobody Home"
  id: garage_opened_while_away
  description: >
    Sends a notification to Louis and Lindsay when either garage door
    opens and both people are away from home.
  triggers:
    - trigger: state
      entity_id:
        - cover.left_garage_door_opener_garage_door
        - cover.right_garage_door_opener_garage_door
      to: "open"
  conditions:
    - condition: numeric_state
      entity_id: zone.home
      below: 1
  actions:
    - variables:
        door_name: >-
          {% if trigger.entity_id == 'cover.left_garage_door_opener_garage_door' %}
            Left Garage Door
          {% else %}
            Right Garage Door
          {% endif %}

    - alias: "Notify Louis"
      action: notify.mobile_app_louis_iphone
      data:
        title: "🚨 Garage Opened — Nobody Home"
        message: "{{ door_name }} was opened while you're both away."
        data:
          tag: "garage_away_{{ trigger.entity_id }}"
          url: "{{ states('sensor.nabu_casa_security_url') }}"

    - alias: "Notify Lindsay"
      action: notify.mobile_app_lindsays_iphone
      data:
        title: "🚨 Garage Opened — Nobody Home"
        message: "{{ door_name }} was opened while you're both away."
        data:
          tag: "garage_away_{{ trigger.entity_id }}"
          url: "{{ states('sensor.nabu_casa_security_url') }}"

  mode: parallel
  max: 2


# 8. Notify when a garage door closes while both away
- alias: "Garage — Closed While Nobody Home"
  id: garage_closed_while_away
  description: >
    Sends a notification to Louis and Lindsay when either garage door closes
    while both are away from home.
  triggers:
    - trigger: state
      entity_id:
        - cover.left_garage_door_opener_garage_door
        - cover.right_garage_door_opener_garage_door
      to: "closed"
      from: "open"
  conditions:
    - condition: numeric_state
      entity_id: zone.home
      below: 1
  actions:
    - variables:
        door_name: >-
          {% if trigger.entity_id == 'cover.left_garage_door_opener_garage_door' %}
            Left Garage Door
          {% else %}
            Right Garage Door
          {% endif %}

    - alias: "Notify Louis"
      action: notify.mobile_app_louis_iphone
      data:
        title: "✅ Garage Closed — Nobody Home"
        message: "{{ door_name }} was closed while you're both away."
        data:
          tag: "garage_away_{{ trigger.entity_id }}"
          url: "{{ states('sensor.nabu_casa_security_url') }}"

    - alias: "Notify Lindsay"
      action: notify.mobile_app_lindsays_iphone
      data:
        title: "✅ Garage Closed — Nobody Home"
        message: "{{ door_name }} was closed while you're both away."
        data:
          tag: "garage_away_{{ trigger.entity_id }}"
          url: "{{ states('sensor.nabu_casa_security_url') }}"

  mode: parallel
  max: 2


