##############################################################################
# Section 13: Ring Camera Snapshot Refresh
# Forces a fresh snapshot from Ring every 2 minutes so dashboard tiles
# don't show stale images during quiet periods between motion events.
##############################################################################

- alias: "Ring Camera Snapshot Refresh"
  id: ring_camera_snapshot_refresh
  triggers:
    - trigger: time_pattern
      minutes: "/2"
  actions:
    - action: homeassistant.update_entity
      target:
        entity_id:
          - camera.garage_stickup_cam_1_live_view
          - camera.personnel_door_live_view
  mode: single

##############################################################################
# Section 14: Office Camera Privacy Mode — Webhook triggers
# Called by Apple Shortcuts via HTTP POST.
# On URL: POST https://[nabu-casa]/api/webhook/office_cam_privacy_on
# Off URL: POST https://[nabu-casa]/api/webhook/office_cam_privacy_off
##############################################################################

- alias: "Office Cam — Privacy Mode On"
  id: office_cam_privacy_on
  triggers:
    - trigger: webhook
      webhook_id: office_cam_privacy_on
      allowed_methods:
        - POST
        - GET
      local_only: false
  actions:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.office_cam_privacy
  mode: single

- alias: "Office Cam — Privacy Mode Off"
  id: office_cam_privacy_off
  triggers:
    - trigger: webhook
      webhook_id: office_cam_privacy_off
      allowed_methods:
        - POST
        - GET
      local_only: false
  actions:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.office_cam_privacy
  mode: single
