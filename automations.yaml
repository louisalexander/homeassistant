##############################################################################
# 6. BATTERY ALERTS
##############################################################################


# 19. Daily Low Battery Check
- alias: "Battery — Daily Low Battery Check"
  id: battery_daily_low_check
  description: >
    Checks all battery sensors at 9am and notifies Louis if any are below 20%.
    Dynamically catches every battery-class sensor — no manual list to maintain.
  triggers:
    - trigger: time
      at: "09:00:00"
  conditions: []
  actions:
    - variables:
        low_batteries: >-
          {% set threshold = 20 %}
          {% set ns = namespace(sensors=[]) %}
          {% for state in states.sensor
             if state.attributes.device_class == 'battery'
             and state.state | float(-1) >= 0
             and state.state | float > -1
             and state.state not in ['unavailable', 'unknown']
             and state.state | float < threshold %}
            {% set ns.sensors = ns.sensors + [state.name ~ ' (' ~ state.state | int ~ '%)'] %}
          {% endfor %}
          {{ ns.sensors | join('\n• ') }}

    - condition: template
      value_template: "{{ low_batteries | length > 0 }}"

    - action: notify.mobile_app_louis_iphone
      data:
        title: "🔋 Low Battery Alert"
        message: "The following sensors need new batteries:\n• {{ low_batteries }}"
        data:
          tag: "battery_alert"
          url: "{{ states('sensor.nabu_casa_security_url') }}"

  mode: single


##############################################################################
# 7. THERMOSTAT PRESENCE
##############################################################################


# 20. Set Away when last person leaves (only when outside temp < 85°F)
- alias: "Thermostat — Away When House Empty"
  id: thermostat_away_when_empty
  description: >
    Sets both ecobees to Away preset when zone.home drops to 0 (everyone gone),
    but only if the outside temperature is below 85°F.
  triggers:
    - trigger: state
      entity_id: zone.home
      to: "0"
      for:
        minutes: 2
  conditions:
    - condition: numeric_state
      entity_id: weather.forecast_home
      attribute: temperature
      below: 85
  actions:
    - action: climate.set_preset_mode
      target:
        entity_id:
          - climate.bedroom
          - climate.office
      data:
        preset_mode: "away"
  mode: single


# 21. Return to Home when outside temp exceeds 85°F while everyone is away
- alias: "Thermostat — Home When Too Hot Outside While Away"
  id: thermostat_home_when_hot_outside
  description: >
    If the outside temperature rises above 85°F while the house is empty and
    the thermostats are in Away mode, switch back to Home preset.
  triggers:
    - trigger: numeric_state
      entity_id: weather.forecast_home
      attribute: temperature
      above: 85
  conditions:
    - condition: state
      entity_id: zone.home
      state: "0"
    - condition: state
      entity_id: climate.bedroom
      attribute: preset_mode
      state: "away"
  actions:
    - action: climate.set_preset_mode
      target:
        entity_id:
          - climate.bedroom
          - climate.office
      data:
        preset_mode: "home"
  mode: single


# 22. Return to Home when someone arrives
- alias: "Thermostat — Home When Someone Arrives"
  id: thermostat_home_on_arrival
  description: >
    Sets both ecobees back to Home preset when zone.home rises from 0 (first
    person back). Only fires if a thermostat is currently in Away mode.
  triggers:
    - trigger: state
      entity_id: zone.home
      from: "0"
  conditions:
    - condition: or
      conditions:
        - condition: state
          entity_id: climate.bedroom
          attribute: preset_mode
          state: "away"
        - condition: state
          entity_id: climate.office
          attribute: preset_mode
          state: "away"
  actions:
    - action: climate.set_preset_mode
      target:
        entity_id:
          - climate.bedroom
          - climate.office
      data:
        preset_mode: "home"
  mode: single


##############################################################################
# 8. GARAGE OPEN TOO LONG
##############################################################################


# 22. Garage Door Open Too Long Reminder
- alias: "Garage — Open Too Long Reminder"
  id: garage_open_too_long
  description: >
    Sends a notification if either garage door has been open for 30 consecutive
    minutes between 6am and 11pm. Includes a "Close It" action button.
  triggers:
    - trigger: state
      entity_id: cover.left_garage_door_opener_garage_door
      to: "open"
      for: "00:30:00"
    - trigger: state
      entity_id: cover.right_garage_door_opener_garage_door
      to: "open"
      for: "00:30:00"
  conditions:
    - condition: time
      after: "06:00:00"
      before: "23:00:00"
  actions:
    - variables:
        door_name: >-
          {% if trigger.entity_id == 'cover.left_garage_door_opener_garage_door' %}
            Left Garage
          {% else %}
            Right Garage
          {% endif %}

    - action: notify.mobile_app_louis_iphone
      data:
        title: "🚗 Garage Door Open"
        message: "{{ door_name }} has been open for 30 minutes."
        data:
          tag: "garage_open_{{ trigger.entity_id }}"
          url: "{{ states('sensor.nabu_casa_security_url') }}"
          actions:
            - action: "CLOSE_GARAGE"
              title: "Close It"

  mode: parallel
  max: 2


# 23. Handle "Close It" tap on the notification
- alias: "Garage — Close from Notification"
  id: garage_close_from_notification
  description: Closes both garage doors when Louis taps "Close It" on the open-too-long alert.
  triggers:
    - trigger: event
      event_type: mobile_app_notification_action
      event_data:
        action: "CLOSE_GARAGE"
  conditions: []
  actions:
    - action: cover.close_cover
      target:
        entity_id:
          - cover.left_garage_door_opener_garage_door
          - cover.right_garage_door_opener_garage_door
  mode: single


##############################################################################
# Section: TOU Peak Mode
##############################################################################

# Toggle peak_mode on when TOU period becomes peak
- alias: "TOU — Enable Peak Mode"
  id: tou_enable_peak_mode
  description: Turns on input_boolean.peak_mode when the TOU period enters peak.
  triggers:
    - trigger: state
      entity_id: sensor.tou_period
      to: "peak"
  actions:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.peak_mode
  mode: single

# Toggle peak_mode off when TOU period leaves peak
- alias: "TOU — Disable Peak Mode"
  id: tou_disable_peak_mode
  description: Turns off input_boolean.peak_mode when the TOU period leaves peak.
  triggers:
    - trigger: state
      entity_id: sensor.tou_period
      not_to: "peak"
  actions:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.peak_mode
  mode: single


