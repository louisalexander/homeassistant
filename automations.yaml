##############################################################################
# 4. AIR QUALITY — MASTER BEDROOM
#
# CO₂  — alert > 1000 ppm / clear < 800 ppm
# VOCs — alert > 1000 µg/m³ / clear < 800 µg/m³
# 5-min "for" clause on alerts prevents false positives from momentary spikes.
##############################################################################


# 11. Bedroom CO₂ High — Alert
- alias: "Air Quality — CO₂ High Alert"
  id: air_quality_co2_high_alert
  description: >
    Notifies Louis and Lindsay when bedroom CO₂ has been above 1000 ppm
    for 5 consecutive minutes.
  triggers:
    - trigger: numeric_state
      entity_id: sensor.bedroom_carbon_dioxide
      above: 1000
      for: "00:05:00"
  conditions: []
  actions:
    - alias: "Notify Louis"
      action: notify.mobile_app_louis_iphone
      data:
        title: "😮‍💨 CO₂ High — Bedroom"
        message: >-
          CO₂ is {{ states('sensor.bedroom_carbon_dioxide') | int }} ppm.
          Crack a window or open the bedroom door.
        data:
          tag: "air_quality_co2"
          url: "{{ states('sensor.nabu_casa_climate_url') }}"

    - alias: "Notify Lindsay"
      action: notify.mobile_app_lindsays_iphone
      data:
        title: "😮‍💨 CO₂ High — Bedroom"
        message: >-
          CO₂ is {{ states('sensor.bedroom_carbon_dioxide') | int }} ppm.
          Crack a window or open the bedroom door.
        data:
          tag: "air_quality_co2"
          url: "{{ states('sensor.nabu_casa_climate_url') }}"

    - alias: "Persistent HA notification"
      action: persistent_notification.create
      data:
        title: "😮‍💨 CO₂ High — Bedroom"
        message: >-
          CO₂ is {{ states('sensor.bedroom_carbon_dioxide') | int }} ppm
          (threshold: 1000 ppm). Crack a window or open the door.
        notification_id: "air_quality_co2"

  mode: single


# 12. Bedroom CO₂ Cleared
- alias: "Air Quality — CO₂ Cleared"
  id: air_quality_co2_cleared
  description: >
    Sends an all-clear when bedroom CO₂ drops back below 800 ppm.
    Uses the same notification tag to replace the alert on both phones.
  triggers:
    - trigger: numeric_state
      entity_id: sensor.bedroom_carbon_dioxide
      below: 800
  conditions: []
  actions:
    - alias: "Notify Louis — cleared"
      action: notify.mobile_app_louis_iphone
      data:
        title: "✅ CO₂ Normal — Bedroom"
        message: "CO₂ is back to {{ states('sensor.bedroom_carbon_dioxide') | int }} ppm."
        data:
          tag: "air_quality_co2"

    - alias: "Notify Lindsay — cleared"
      action: notify.mobile_app_lindsays_iphone
      data:
        title: "✅ CO₂ Normal — Bedroom"
        message: "CO₂ is back to {{ states('sensor.bedroom_carbon_dioxide') | int }} ppm."
        data:
          tag: "air_quality_co2"

    - alias: "Dismiss HA notification"
      action: persistent_notification.dismiss
      data:
        notification_id: "air_quality_co2"

  mode: single


