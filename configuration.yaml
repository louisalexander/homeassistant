
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

homekit: !include homekit.yaml

influxdb: !include influxdb_ha.yaml

##############################################################################
# TOU — Time-of-Use (Dominion Energy Schedule 1G)
##############################################################################

homeassistant:
  packages:
    tou: !include configuration_tou_addition.yaml

##############################################################################
# Mock Door Sensor Buttons — Konnected placeholders
##############################################################################

input_boolean:
  office_cam_privacy:
    name: "Office Camera Privacy Mode"
    icon: mdi:camera-off

input_button:
  front_door_test:
    name: "Front Door (Test)"
    icon: mdi:door-open
  garage_door_test:
    name: "Garage Door (Test)"
    icon: mdi:garage-open
  rear_door_test:
    name: "Rear Door (Test)"
    icon: mdi:door-open

##############################################################################
# Template sensors
##############################################################################

template:
  - sensor:
      # Maps Winix airflow attribute → numeric scale for InfluxDB/Grafana trending.
      # 0=off, 1=low/sleep, 2=medium, 3=high — reflects actual airflow regardless of mode.
      - name: "Bedroom Purifier Speed"
        unique_id: bedroom_purifier_speed
        unit_of_measurement: ""
        state_class: measurement
        state: >
          {% if is_state('fan.bedroom_air_purifier', 'off') %}0
          {% else %}
            {% set flow = state_attr('fan.bedroom_air_purifier', 'airflow') %}
            {% if flow == 'high' %}3
            {% elif flow == 'medium' %}2
            {% elif flow in ['low', 'sleep'] %}1
            {% else %}0
            {% endif %}
          {% endif %}

##############################################################################
# MQTT binary sensors
# Thingino setup required first: Thingino web UI → MQTT → set broker to
# HA's local IP, port 1883. Verify exact topic with:
#   mosquitto_sub -h localhost -t '#' then trigger motion on camera.
# Hostname "ing-wyze-cam3-3a32" taken from camera overlay.
# off_delay: sensor auto-clears 30s after trigger (camera sends on-events only).
##############################################################################

mqtt:
  binary_sensor:
    - name: "Office Cam Motion"
      unique_id: office_cam_motion
      state_topic: "thingino/ing-wyze-cam3-3a32/motion"
      payload_on: "on"
      payload_off: "off"
      off_delay: 30
      device_class: motion
