
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

homekit: !include homekit.yaml

influxdb: !include influxdb_ha.yaml

##############################################################################
# TOU — Time-of-Use (Dominion Energy Schedule 1G)
##############################################################################

homeassistant:
  packages:
    tou: !include configuration_tou_addition.yaml

##############################################################################
# Mock Door Sensor Buttons — Konnected placeholders
##############################################################################

input_button:
  front_door_test:
    name: "Front Door (Test)"
    icon: mdi:door-open
  garage_door_test:
    name: "Garage Door (Test)"
    icon: mdi:garage-open
  rear_door_test:
    name: "Rear Door (Test)"
    icon: mdi:door-open
